# CI test gate for @betanyc/nyc-council-mcp.
#
# Enforces that the package builds and its test suite passes on every PR and
# on every push to main, across a Node LTS matrix, before code lands. This is
# the same gate the BetaNYC Python tree runs (engineering-checks.yml) and the
# sibling nyc-charter-laws-rules MCP runs (test.yml), extended to this repo.
# Owned by the software-engineer agent.
#
# Node matrix: 20.x and 22.x. package.json declares "engines.node >= 18", and
# this matrix satisfies that floor while testing only actively-maintained LTS
# releases. Node 18 reached End-of-Life on 2025-04-30 and is excluded on
# purpose — the same call the sibling nyc-charter-laws-rules repo made — so CI
# never greenlights code against an unpatched runtime. If the engines floor is
# raised to >= 20 in a future release, drop this note. 22.x is the current LTS,
# so the matrix still tests both ends of the supported range.

name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"
  # Manual trigger — lets us fire a run on any branch. Needed here because a
  # path-scoped pull_request/push event does not fire on the very PR that
  # introduces the workflow, so this gate never executed on its own PR (#6).
  # Retained permanently as a low-cost affordance for on-demand re-runs.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Build & test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "20.x"
          - "22.x"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Build separately from the test step so the CI log distinguishes a
      # compile failure from a test failure, even though `npm test` also
      # builds internally. The redundant build is cheap (tsc is fast) and the
      # clearer failure signal is worth it.
      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  # Merged ≠ shipped guard. Consumers run `npx -y @betanyc/nyc-council-mcp`, so
  # the npm registry — not main — is what ships. A PR that changes shipped code
  # but leaves package.json at a version already on the registry would merge
  # "green" yet publish nothing. This job fails such a PR with a bump reminder.
  # PR-only (needs a base to diff against). Docs/CI-only PRs skip untouched.
  # See platform/system/engineering-standards.md "Release protocol" in the
  # BetaNYC workspace, and BetaNYC/nyc-council-mcp#15.
  version-guard:
    name: Version guard (merged ≠ shipped)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      # fetch-depth: 0 so the PR base SHA is present locally for the diff.
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if shipped code changed without a version bump
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          echo "PR base SHA: $BASE_SHA"
          # Three-dot diff (merge-base..HEAD) restricted to files that ship in
          # the npm package. If nothing here changed, the guard does not apply.
          CHANGED=$(git diff --name-only "$BASE_SHA...HEAD" -- src package.json)
          if [ -z "$CHANGED" ]; then
            echo "No shipped files changed (src/, package.json) — version guard not applicable. Passing."
            exit 0
          fi
          echo "Shipped files changed in this PR:"
          echo "$CHANGED"
          NAME=$(node -p "require('./package.json').name")
          CURRENT=$(node -p "require('./package.json').version")
          echo "Package $NAME, local version $CURRENT"
          # Exact, unauthenticated registry probe. On a hit npm prints the bare
          # version and exits 0; on a miss it errors (E404) with nothing on
          # stdout. Matching the printed string is robust to both — we never
          # rely on the exit code.
          PUBLISHED=$(npm view "$NAME@$CURRENT" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$CURRENT" ]; then
            echo "::error::$NAME@$CURRENT is already published to npm, but this PR changes shipped code (src/ or package.json). Bump the version in package.json (fix=patch, feature=minor, breaking=major) and add a CHANGELOG.md entry in the same PR — consumers run 'npx -y', so merging without a bump ships nothing. After merge, push the matching v<new-version> tag to fire the release workflow."
            exit 1
          fi
          echo "$NAME@$CURRENT is not on the registry yet — version bump present. Guard passes."
