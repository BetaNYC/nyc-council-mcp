# CI test gate for @betanyc/nyc-council-mcp.
#
# Enforces that the package builds and its test suite passes on every PR and
# on every push to main, across a Node LTS matrix, before code lands. This is
# the same gate the BetaNYC Python tree runs (engineering-checks.yml) and the
# sibling nyc-charter-laws-rules MCP runs (test.yml), extended to this repo.
# Owned by the software-engineer agent.
#
# Node matrix: 20.x and 22.x. package.json declares "engines.node >= 18", and
# this matrix satisfies that floor while testing only actively-maintained LTS
# releases. Node 18 reached End-of-Life on 2025-04-30 and is excluded on
# purpose — the same call the sibling nyc-charter-laws-rules repo made — so CI
# never greenlights code against an unpatched runtime. If the engines floor is
# raised to >= 20 in a future release, drop this note. 22.x is the current LTS,
# so the matrix still tests both ends of the supported range.

name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "**/*.ts"
      - "**/*.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"
  # Manual trigger — lets us fire a run on any branch. Needed here because a
  # path-scoped pull_request/push event does not fire on the very PR that
  # introduces the workflow, so this gate never executed on its own PR (#6).
  # Retained permanently as a low-cost affordance for on-demand re-runs.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Build & test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "20.x"
          - "22.x"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Build separately from the test step so the CI log distinguishes a
      # compile failure from a test failure, even though `npm test` also
      # builds internally. The redundant build is cheap (tsc is fast) and the
      # clearer failure signal is worth it.
      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
